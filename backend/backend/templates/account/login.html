{% load tailwind_tags socialaccount %}
<!DOCTYPE html>
<html lang="pt-br" x-data="{ showAdmin: false, loading: false, socialLoading: false }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mapa-Força 15º GB</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Alpine JS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }

        .glass-login {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
        }

        .btn-google {
            background: #ffffff;
            color: #1e293b;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-google:hover {
            background: #f8fafc;
            transform: scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(255, 255, 255, 0.1);
        }

        .mesh-bg {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(225, 29, 72, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%);
        }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center p-3 overflow-hidden relative">

    <!-- Decorativos REDUZIDOS -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute -top-16 -left-16 w-64 h-64 bg-red-600/10 rounded-full blur-[80px] animate-pulse"></div>
        <div class="absolute -bottom-16 -right-16 w-64 h-64 bg-blue-600/10 rounded-full blur-[80px] animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <div class="w-full max-w-[380px] relative z-10 animate-fade-in">
        
        <div class="glass-login rounded-2xl p-6 flex flex-col items-center border border-white/5">
            
            <!-- Logo REDUZIDO -->
            <div class="mb-6 text-center group">
                <div class="h-14 w-14 bg-red-600 rounded-xl flex items-center justify-center shadow-2xl shadow-red-600/40 mb-4 mx-auto transform -rotate-6 group-hover:rotate-0 transition-transform duration-500">
                    <svg class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-black text-white uppercase tracking-tighter italic leading-none">
                    MAPA<span class="text-red-500">FORÇA</span>
                </h1>
                <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.3em] mt-2">Acesso Operacional</p>
            </div>

            <!-- Messages REDUZIDAS -->
            {% if messages %}
            <div class="w-full mb-5 space-y-1.5">
                {% for message in messages %}
                <div class="p-2.5 bg-amber-500/10 border border-amber-500/20 rounded-xl text-amber-400 text-[8px] font-black uppercase tracking-widest text-center">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- PRIMARY ACTION: GOOGLE REDUZIDO -->
            <div class="w-full space-y-4">
                <a href="{% provider_login_url 'google' %}" 
                   @click="socialLoading = true"
                   class="w-full btn-google py-3.5 rounded-xl flex items-center justify-center space-x-2.5 shadow-2xl active:scale-95 group transition-all">
                    <svg x-show="!socialLoading" class="h-4 w-4" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"/>
                    </svg>
                    <svg x-show="socialLoading" x-cloak class="animate-spin h-4 w-4 text-slate-900" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-[10px] font-black uppercase tracking-widest" x-text="socialLoading ? 'CONECTANDO...' : 'Entrar com Google'"></span>
                </a>

                <!-- SECONDARY: ADMIN LOGIN REDUZIDO -->
                <div class="pt-4 border-t border-white/5">
                    <button @click="showAdmin = !showAdmin" 
                            class="w-full text-[8px] font-black text-slate-500 hover:text-slate-300 uppercase tracking-[0.2em] transition-colors flex items-center justify-center space-x-1.5">
                        <span x-text="showAdmin ? 'Ocultar Acesso Admin' : 'Acesso Administrativo'"></span>
                        <svg class="h-2.5 w-2.5 transform transition-transform" :class="showAdmin ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 9l-7 7-7-7" stroke-width="3"/></svg>
                    </button>

                    <div x-show="showAdmin" x-cloak x-transition.opacity.scale.origin.top class="mt-5 space-y-3">
                        <form class="space-y-3" method="POST" action="{% url 'account_login' %}" @submit="loading = true">
                            {% csrf_token %}
                            <input type="email" name="login" required
                                   class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 px-4 text-white text-[10px] font-bold placeholder-slate-600 focus:outline-none focus:border-red-600/50 transition-all"
                                   placeholder="Email Admin">
                            
                            <div class="relative">
                                <input type="password" name="password" required
                                       class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 px-4 text-white text-[10px] font-bold placeholder-slate-600 focus:outline-none focus:border-red-600/50 transition-all"
                                       placeholder="Senha">
                            </div>

                            <button type="submit" 
                                    class="w-full bg-slate-800 hover:bg-red-600 text-white font-black py-2.5 rounded-xl uppercase tracking-widest text-[8px] transition-all disabled:opacity-50"
                                    :disabled="loading">
                                <span x-show="!loading">AUTENTICAR ADMIN</span>
                                <span x-show="loading" class="flex items-center justify-center space-x-1.5">
                                    <svg class="animate-spin h-3 w-3 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                </span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Footer REDUZIDO -->
            <div class="mt-6 text-center">
                <p class="text-[6px] font-black text-slate-600 uppercase tracking-[0.3em]">&copy; 2026 Corpo de Bombeiros PMESP</p>
            </div>
        </div>
    </div>

    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>

</body>
</html>
