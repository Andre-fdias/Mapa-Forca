{% load static %}
{% if user.role == 'COBOM' or user.is_superuser %}
<div x-data="{ 
    showPopup: false,
    checkTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const currentTime = `${hours}:${minutes}`;
        
        // Horários alvo
        const targets = ['06:55', '18:55'];
        
        if (targets.includes(currentTime)) {
            const lastShown = sessionStorage.getItem('lastCobomPopup');
            const todayKey = `${new Date().toLocaleDateString()}-${currentTime}`;
            
            if (lastShown !== todayKey) {
                this.showPopup = true;
                sessionStorage.setItem('lastCobomPopup', todayKey);
                // Toca um som de alerta opcional
                // new Audio('{% static "sounds/alert.mp3" %}').play();
            }
        }
    }
}" 
x-init="checkTime(); setInterval(() => checkTime(), 30000)">

    <!-- Overlay Modal REDUZIDO -->
    <div x-show="showPopup" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-90"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-90"
         class="fixed inset-0 z-[200] flex items-center justify-center p-3 bg-black/80 backdrop-blur-sm"
         x-cloak>
        
        <div class="bg-slate-900 border-2 border-red-600 rounded-2xl max-w-md w-full p-5 shadow-[0_0_50px_rgba(220,38,38,0.3)] relative overflow-hidden">
            <!-- Efeito de Fundo REDUZIDO -->
            <div class="absolute -right-16 -top-16 opacity-10 pointer-events-none">
                <svg class="w-48 h-48 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>

            <div class="relative z-10 text-center">
                <div class="h-12 w-12 bg-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-[0_0_30px_rgba(220,38,38,0.5)] animate-bounce">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>

                <h2 class="text-xl font-black text-white uppercase tracking-tighter mb-2">Atenção COBOM!</h2>
                
                <p class="text-slate-300 text-sm font-bold mb-5 uppercase leading-tight">
                    É hora de realizar a composição do <br>
                    <span class="text-red-500">Mapa Força COBOM</span> do próximo turno.
                </p>

                <div class="flex flex-col space-y-2.5">
                    <a href="{% url 'compor_mapa' %}?is_cobom=true" 
                       class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-3 rounded-xl transition-all transform hover:scale-105 shadow-xl uppercase tracking-widest text-[10px] flex items-center justify-center">
                        <svg class="h-3.5 w-3.5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        Compor Mapa Agora
                    </a>
                    
                    <button @click="showPopup = false" 
                            class="w-full bg-slate-800 hover:bg-slate-700 text-slate-400 font-black py-2.5 rounded-xl transition-all uppercase tracking-widest text-[9px]">
                        Entendido, fechar aviso
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endif %}
