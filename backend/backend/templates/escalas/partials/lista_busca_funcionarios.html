<div class="py-0.5">
    {% for funcionario in funcionarios %}
    <div class="px-2 py-1.5 hover:bg-red-50 cursor-pointer border-b border-gray-50 last:border-0 transition-colors duration-150"
         onclick="this.closest('form').querySelector('input[name=\'funcionario_re\']').value = '{{ funcionario.re }}'; this.parentElement.innerHTML = '';">
        <div class="text-[11px] font-bold text-gray-900">{{ funcionario.identidade_militar }}</div>
        <div class="text-[8px] text-gray-500">{{ funcionario.nome_completo }}</div>
    </div>
    {% empty %}
    <div class="px-2 py-1.5 text-[10px] text-gray-400 italic">Nenhum funcionário encontrado.</div>
    {% endfor %}
</div>
