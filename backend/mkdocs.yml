site_name: Mapa-Força - Documentação Técnica
theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Modo Escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Modo Claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.mermaid_format
  - attr_list
  - md_in_html

nav:
  - Introdução: index.md
  - Arquitetura do Sistema: arquitetura.md
  - Estrutura de Diretórios: diretorios.md
  - Fluxos do Sistema: fluxos.md
  - Modelos de Dados: modelos.md
  - APIs e Integrações: apis.md
  - Interface (Frontend): frontend.md
  - Deploy e Ambiente: deploy.md
  - Boas Práticas: boas_praticas.md
