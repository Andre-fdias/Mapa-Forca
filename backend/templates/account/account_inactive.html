<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguardando Aprovação | Mapa-Força</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mesh-bg {
            background-color: #020617;
            background-image: radial-gradient(at 50% 50%, rgba(245, 158, 11, 0.1) 0px, transparent 50%);
        }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl rounded-[3rem] p-12 border border-white/5 text-center shadow-2xl">
        <div class="h-24 w-24 bg-amber-500 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-amber-500/20 mb-10 mx-auto transform -rotate-3">
            <svg class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic leading-none mb-6">
            ACESSO EM <span class="text-amber-500">ANÁLISE</span>
        </h1>
        
        <div class="space-y-4 text-slate-400">
            <p class="text-sm font-bold uppercase tracking-widest text-slate-300">Olá militar,</p>
            <p class="text-xs leading-relaxed font-medium uppercase tracking-wider">
                Seu login via <span class="text-white font-black">Google</span> foi identificado com sucesso.
            </p>
            <p class="text-[10px] leading-relaxed font-bold border-t border-white/5 pt-6 uppercase tracking-[0.2em]">
                Sua conta está em processo de <span class="text-amber-500">auditoria e aprovação</span> pelo administrador do sistema.
            </p>
        </div>

        <div class="mt-12 pt-8 border-t border-white/5" x-data="{ countdown: 10 }" x-init="setInterval(() => { if(countdown > 0) countdown--; else window.location.href='/accounts/login/' }, 1000)">
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4">Redirecionando em <span x-text="countdown" class="text-amber-500"></span> segundos...</p>
            <a href="/accounts/login/" class="inline-block px-8 py-4 bg-white/5 hover:bg-white/10 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">
                Voltar para Login
            </a>
        </div>
    </div>
</body>
</html>
