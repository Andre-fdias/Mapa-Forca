{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="pt-br" x-data="{ showPassword: false, loading: false }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mapa-Força 15º GB</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Alpine JS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        .glass-login {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .btn-sexy {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-sexy:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
        }

        /* Animação do Fundo */
        .mesh-bg {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(220, 38, 38, 0.15) 0px, transparent 50%);
        }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <!-- Elementos Decorativos -->
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px] animate-float"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-red-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: -3s"></div>

    <div class="w-full max-w-md relative z-10" 
         x-transition:enter="transition ease-out duration-700"
         x-transition:enter-start="opacity-0 scale-95 translate-y-10"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-init="() => { $el.style.display = 'block' }">
        
        <div class="glass-login rounded-[2.5rem] p-10 flex flex-col items-center">
            
            <!-- Logo & Brand -->
            <div class="mb-10 text-center">
                <div class="h-20 w-20 bg-red-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-red-600/30 mb-6 mx-auto transform -rotate-6">
                    <svg class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic">
                    MAPA<span class="text-red-500">FORÇA</span>
                </h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">15º Grupamento de Bombeiros</p>
            </div>

            <!-- Login Form -->
            <form class="w-full space-y-6" method="POST" action="{% url 'account_login' %}" @submit="loading = true">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs font-bold animate-pulse text-center">
                    Usuário ou senha inválidos.
                </div>
                {% endif %}

                <!-- Field: User -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-500 transition-colors">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
                    </div>
                    <input type="email" name="login" required
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all input-glow font-medium"
                           placeholder="E-mail funcional">
                </div>

                <!-- Field: Password -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-500 transition-colors">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2"/></svg>
                    </div>
                    <input :type="showPassword ? 'text' : 'password'" name="password" required
                           class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-12 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all input-glow font-medium"
                           placeholder="Senha de acesso">
                    <button type="button" @click="showPassword = !showPassword"
                            class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-500 hover:text-white transition-colors">
                        <svg x-show="!showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        <svg x-show="showPassword" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 014.13-4.13m3.08-1.03A10.05 10.05 0 0112 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-1.172 0-2.285-.202-3.315-.572M15 12a3 3 0 11-6 0 3 3 0 016 0zm-9.9-9.9l19.8 19.8" /></svg>
                    </button>
                </div>

                <!-- Helpers -->
                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <div class="relative">
                            <input type="checkbox" name="remember" class="sr-only">
                            <div class="w-10 h-5 bg-white/10 rounded-full transition-colors group-hover:bg-white/20"></div>
                            <div class="dot absolute left-1 top-1 bg-slate-400 w-3 h-3 rounded-full transition-transform"></div>
                        </div>
                        <span class="text-xs font-bold text-slate-400 group-hover:text-slate-200 transition-colors">Lembrar acesso</span>
                    </label>
                    <a href="{% url 'account_reset_password' %}" class="text-xs font-bold text-blue-500 hover:text-blue-400 transition-colors">Esqueceu a senha?</a>
                </div>

                <!-- Action -->
                <button type="submit" 
                        class="w-full btn-sexy text-white font-black py-5 rounded-3xl uppercase tracking-widest text-sm flex items-center justify-center space-x-3 disabled:opacity-50"
                        :disabled="loading">
                    <span x-show="!loading">ENTRAR NO SISTEMA</span>
                    <span x-show="loading" x-cloak class="flex items-center space-x-2">
                        <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span>AUTENTICANDO...</span>
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-12 text-center space-y-2">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">&copy; 2026 Corpo de Bombeiros da PMESP</p>
                <div class="flex items-center justify-center space-x-2">
                    <span class="h-1 w-1 bg-slate-700 rounded-full"></span>
                    <span class="text-[9px] font-bold text-slate-600 uppercase">Versão 2.4.0-PRO</span>
                    <span class="h-1 w-1 bg-slate-700 rounded-full"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Checkbox Switch Style -->
    <style>
        input:checked ~ .dot {
            transform: translateX(20px);
            background-color: #3b82f6;
        }
        input:checked ~ .w-10 {
            background-color: rgba(59, 130, 246, 0.2);
        }
    </style>

</body>
</html>
