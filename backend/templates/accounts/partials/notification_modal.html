{% if pending_modal_notifications %}
    {% with n=pending_modal_notifications.0 %}
    <div id="global-notification-container" class="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm animate-fade-in">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-2xl shadow-2xl border border-slate-100 dark:border-slate-800 overflow-hidden transform animate-pop-in">
            <div class="{% if n.tipo == 'success' %}bg-emerald-600{% elif n.tipo == 'warning' %}bg-amber-600{% elif n.tipo == 'danger' %}bg-red-600{% else %}bg-blue-600{% endif %} p-4 text-white flex flex-col items-center">
                <div class="h-12 w-12 bg-white/20 rounded-full flex items-center justify-center mb-2">
                    {% if n.tipo == 'success' %}
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
                    {% elif n.tipo == 'danger' %}
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    {% else %}
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                    {% endif %}
                </div>
                <h3 class="text-lg font-black uppercase tracking-tighter italic">Aviso do Sistema</h3>
            </div>
            
            <div class="p-6 text-center">
                <p class="text-sm font-bold text-slate-700 dark:text-slate-200 leading-relaxed">{{ n.mensagem }}</p>
                <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-4 italic">Esta mensagem não será exibida novamente.</p>
            </div>
            
            <div class="p-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700">
                <button hx-post="{% url 'mark_notification_read' n.id %}" 
                        hx-target="#global-notification-container" 
                        hx-swap="delete"
                        class="w-full {% if n.tipo == 'success' %}bg-emerald-600 hover:bg-emerald-700{% elif n.tipo == 'warning' %}bg-amber-600 hover:bg-amber-700{% elif n.tipo == 'danger' %}bg-red-600 hover:bg-red-700{% else %}bg-slate-900 hover:bg-slate-800 dark:bg-white dark:text-slate-900{% endif %} text-white font-black py-3 rounded-xl transition-all shadow-lg active:scale-95 uppercase text-[10px] tracking-widest">
                    Estou Ciente
                </button>
            </div>
        </div>
    </div>
    {% endwith %}
{% endif %}
