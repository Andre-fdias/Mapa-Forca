{% extends "base/base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Solicitação de Acesso</h2>
      <p class="mt-3 text-center text-sm text-gray-600">
        Para prosseguir e acessar os módulos operacionais, defina abaixo sua lotação e o cargo. Sua conta será analisada pela Central.
      </p>
    </div>
    
    <form class="mt-8 space-y-6" action="{% url 'request_access' %}" method="POST">
      {% csrf_token %}
      
      <div class="space-y-5">
        <!-- Batalhão -->
        <div class="pt-2">
            <label for="batalhao" class="block text-sm font-semibold text-gray-700">1. Batalhão / Grande Comando</label>
            <select id="batalhao" name="batalhao_id" 
                    hx-get="{% url 'get_sgbs_htmx' %}" 
                    hx-target="#sgb" 
                    hx-indicator=".htmx-indicator"
                    class="mt-1 block w-full pl-3 pr-10 py-2.5 text-base text-gray-700 bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-lg shadow-sm transition-colors">
                <option value="">Selecione o Batalhão</option>
                {% for b in batalhoes %}
                    <option value="{{ b }}">{{ b }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- SGB -->
        <div>
            <label for="sgb" class="block text-sm font-semibold text-gray-700">2. Subgrupamento (SGB)</label>
            <select id="sgb" name="sgb_id" 
                    hx-get="{% url 'get_postos_htmx' %}" 
                    hx-target="#posto"
                    hx-include="#batalhao"
                    hx-indicator=".htmx-indicator"
                    class="mt-1 block w-full pl-3 pr-10 py-2.5 text-base text-gray-700 bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-lg shadow-sm transition-colors disabled:bg-gray-100">
                <option value="">Aguardando Batalhão...</option>
            </select>
        </div>

        <!-- Posto -->
        <div>
            <label for="posto" class="block text-sm font-semibold text-gray-700">3. Posto Operacional</label>
            <select id="posto" name="posto_id" required class="mt-1 block w-full pl-3 pr-10 py-2.5 text-base text-gray-700 bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-lg shadow-sm transition-colors disabled:bg-gray-100">
                <option value="">Aguardando SGB...</option>
            </select>
        </div>
      </div>
      
      <!-- Indicador HTMX de carregamento -->
      <div class="htmx-indicator hidden text-sm text-indigo-600 items-center justify-center mt-2 py-2">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-indigo-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="font-medium tracking-wide">Carregando unidades...</span>
      </div>

      <div class="pt-4">
        <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all shadow-md active:scale-[0.98]">
          Solicitar Acesso Seguro
        </button>
      </div>
    </form>
  </div>
</div>

<style>
  .htmx-indicator{
      display:none;
  }
  .htmx-request .htmx-indicator{
      display:flex;
  }
  .htmx-request.htmx-indicator{
      display:flex;
  }
</style>
{% endblock %}
