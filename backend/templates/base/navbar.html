<header class="h-20 flex items-center justify-between px-8 sticky top-0 z-40 transition-all duration-300 glass dark:bg-slate-900/80">
    <div class="flex items-center space-x-6">
        <button class="lg:hidden text-slate-500 hover:text-red-600 transition-colors" @click="sidebarOpen = true">
            <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <div class="flex flex-col">
            <h2 class="text-lg font-black text-slate-900 dark:text-white uppercase tracking-tight leading-none">
                {% if user.unidade %}{{ user.unidade.nome }}{% else %}Comando Geral{% endif %}
            </h2>
            <div class="flex items-center space-x-2 mt-1">
                <span class="text-[10px] text-red-600 dark:text-red-400 font-black uppercase tracking-widest">Bombeiros SP</span>
                <span class="text-slate-300 dark:text-slate-700 font-thin">|</span>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{% now "l, d \d\e F \d\e Y" %}</p>
            </div>
        </div>
    </div>

    <div class="flex items-center space-x-5">
        <!-- Dark Mode Toggle -->
        <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)" 
                class="p-2.5 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:text-red-600 transition-all shadow-sm border border-slate-200 dark:border-slate-700">
            <svg x-show="!darkMode" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg x-show="darkMode" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 18v1m9-9h1M3 12h1m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.950 17.657l.707.707M7.050 7.050l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
            </svg>
        </button>

        <!-- Status Indicator -->
        <div class="hidden md:flex items-center space-x-2 px-4 py-2 bg-emerald-50 dark:bg-emerald-950/30 rounded-2xl border border-emerald-200 dark:border-emerald-800/50">
            <div class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
            <span class="text-[10px] font-black text-emerald-700 dark:text-emerald-400 uppercase tracking-widest">Operational</span>
        </div>

        <!-- User/Profile -->
        <a href="{% url 'profile' %}" class="hidden sm:flex items-center space-x-3 pl-5 border-l border-slate-200 dark:border-slate-800 hover:opacity-80 transition-all group">
             <div class="text-right">
                 <p class="text-xs font-black text-slate-900 dark:text-white uppercase leading-none">{{ user.email }}</p>
                 <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{% if user.unidade %}{{ user.unidade.nome }}{% else %}Sem Vínculo{% endif %}</span>
             </div>
             <div class="h-10 w-10 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 flex items-center justify-center text-xs font-black shadow-lg group-hover:scale-105 transition-transform">
                {{ user.email|slice:":1"|upper }}
             </div>
        </a>
    </div>
</header>
