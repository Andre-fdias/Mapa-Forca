{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mapa Força{% endblock %}</title>
    {% tailwind_css %}
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">
    
    <!-- Navbar simples para teste -->
    <nav class="bg-gray-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">MAPA<span class="text-red-500">FORÇA</span></h1>
            <div class="space-x-4 text-sm font-medium">
                <a href="/" class="hover:text-red-400 transition-colors">Início</a>
                <a href="/admin/" class="hover:text-red-400 transition-colors">Admin</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 px-4">
        {% block content %}
        {% endblock content %}
    </main>

</body>
</html>
