{% extends "base/base.html" %}
{% load static %}

{% block title %}Histórico de Escalas | Mapa-Força{% endblock %}

{% block content %}
<div class="flex flex-col space-y-8 animate-fade-in">
    
    <!-- Header com Seletor de Data -->
    <div class="relative p-8 rounded-[2.5rem] glass border border-white/10 overflow-hidden morphism-card">
        <div class="absolute top-0 right-0 -mt-10 -mr-10 h-40 w-40 bg-red-600/10 rounded-full blur-[50px]"></div>
        
        <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between space-y-6 md:space-y-0">
            <div class="space-y-1">
                <div class="flex items-center space-x-3">
                    <span class="h-1 w-6 bg-red-600 rounded-full"></span>
                    <span class="text-[10px] font-black text-red-600 uppercase tracking-[0.3em]">Arquivo Operacional</span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 dark:text-white uppercase tracking-tighter italic">
                    Histórico de <span class="text-red-600">Escalas</span>
                </h1>
            </div>

            <!-- Filtros Avançados -->
            <form class="flex flex-wrap gap-4 items-end bg-slate-100 dark:bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-200 dark:border-slate-800"
                  hx-get="{% url 'historico_mapa' %}" 
                  hx-target="#conteudo-historico" 
                  hx-trigger="change from:input, change from:select, keyup from:input[name='viatura_prefixo'] delay:500ms"
                  hx-push-url="true">
                
                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-1">Data</label>
                    <input type="date" name="data" value="{{ data_selecionada|date:'Y-m-d' }}"
                           class="bg-white dark:bg-slate-950 border-none rounded-xl px-4 py-2 text-xs font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 transition-all cursor-pointer">
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-1">SGB</label>
                    <select name="sgb_id" class="bg-white dark:bg-slate-950 border-none rounded-xl px-4 py-2 text-xs font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 transition-all cursor-pointer min-w-[120px]">
                        <option value="">Todos</option>
                        {% for sgb in sgbs %}
                        <option value="{{ sgb.id }}" {% if sgb.id == sgb_selecionado %}selected{% endif %}>{{ sgb.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-1">Posto/Unidade</label>
                    <select name="unidade_id" class="bg-white dark:bg-slate-950 border-none rounded-xl px-4 py-2 text-xs font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 transition-all cursor-pointer min-w-[150px]">
                        <option value="">Todas</option>
                        {% for u in unidades_lista %}
                        <option value="{{ u.id }}" {% if u.id == unidade_selecionada_id %}selected{% endif %}>{{ u.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-1">Viatura (Prefixo)</label>
                    <input type="text" name="viatura_prefixo" placeholder="Ex: L-15..." value="{{ v_prefixo|default:'' }}"
                           class="bg-white dark:bg-slate-950 border-none rounded-xl px-4 py-2 text-xs font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 transition-all placeholder:text-slate-600">
                </div>

                <!-- Toggle DEJEM -->
                <div class="flex items-center space-x-3 mb-2 px-4">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="dejem" value="true" class="sr-only peer" {% if dejem_only %}checked{% endif %}>
                        <div class="w-10 h-5 bg-slate-300 peer-focus:outline-none dark:bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-600"></div>
                    </label>
                    <span class="text-[9px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest">Apenas DEJEM</span>
                </div>
            </form>
        </div>
    </div>

    <!-- Conteúdo Dinâmico (HTMX) -->
    <div id="conteudo-historico">
        {% include "escalas/partials/conteudo_historico.html" %}
    </div>

</div>

<style>
    @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fade-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
