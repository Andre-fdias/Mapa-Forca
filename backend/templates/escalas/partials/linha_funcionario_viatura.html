<div id="aloc-func-{{ aloc_func.id }}" class="flex items-center justify-between bg-gray-50 border border-gray-100 p-1.5 rounded hover:shadow-sm transition-all duration-200">
    <div class="flex flex-col">
        <span class="text-xs font-bold text-gray-800">{{ aloc_func.funcionario.nome_guerra }}</span>
        <div class="flex items-center space-x-1.5">
            <span class="text-[8px] text-gray-500 font-mono">{{ aloc_func.funcionario.re }}</span>
            <span class="text-[8px] bg-red-100 text-red-800 px-1 rounded font-semibold">{{ aloc_func.funcao.nome }}</span>
        </div>
    </div>
    <button hx-delete="{% url 'remover_funcionario_viatura' aloc_func.id %}"
            hx-target="#aloc-func-{{ aloc_func.id }}"
            hx-swap="outerHTML"
            class="text-gray-300 hover:text-red-500 transition-colors duration-200 p-0.5">
        <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>
</div>
