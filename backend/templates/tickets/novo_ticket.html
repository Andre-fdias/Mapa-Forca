{% extends "base/base.html" %}

{% block title %}Novo Chamado — Mapa Força{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-8 px-4 sm:px-6 lg:px-8 animate-fade-in">
    <div class="mb-8">
        <a href="{% url 'tickets:ticket_list' %}" class="inline-flex items-center text-xs font-black text-slate-500 hover:text-red-600 uppercase tracking-widest transition-colors mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar para lista
        </a>
        <h1 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter italic">
            Abrir Novo <span class="text-red-600">Chamado</span>
        </h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mt-1">
            Descreva o problema ou solicitação para a equipe técnica
        </p>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-white/5 p-6 md:p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="titulo" class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] mb-2">Assunto / Título</label>
                <input type="text" name="titulo" id="titulo" required
                       placeholder="Ex: Erro ao salvar viatura no Posto X"
                       class="w-full bg-slate-50 dark:bg-white/5 border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 focus:border-transparent transition-all outline-none">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="categoria" class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] mb-2">Categoria</label>
                    <select name="categoria" id="categoria" 
                            class="w-full bg-slate-50 dark:bg-white/5 border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 outline-none transition-all appearance-none">
                        {% for code, label in categorias %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="prioridade" class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] mb-2">Prioridade</label>
                    <select name="prioridade" id="prioridade" 
                            class="w-full bg-slate-50 dark:bg-white/5 border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 outline-none transition-all appearance-none">
                        {% for code, label in prioridades %}
                        <option value="{{ code }}" {% if code == 'MEDIA' %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <label for="descricao" class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] mb-2">Descrição Detalhada</label>
                <textarea name="descricao" id="descricao" rows="6" required
                          placeholder="Forneça o máximo de detalhes possível (RE do militar, prefixo da viatura, mensagem de erro, etc.)"
                          class="w-full bg-slate-50 dark:bg-white/5 border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-red-600 focus:border-transparent transition-all outline-none resize-none"></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" 
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-black uppercase tracking-[0.2em] py-4 rounded-xl shadow-lg shadow-red-600/20 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center space-x-2">
                    <span>Enviar Chamado</span>
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M14 5l7 7-7 7M5 12h16"/></svg>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
